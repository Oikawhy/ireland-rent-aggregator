# AGPARS Alembic Configuration

[alembic]
# Path to migration scripts
script_location = packages/storage/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path
prepend_sys_path = .

# Timezone to use for filenames
# timezone = UTC

# Max length of characters for the slug field
truncate_slug_length = 40

# Set to 'true' to run migrations in lexicographic order
revision_environment = false

# SQLAlchemy URL (runtime from env)
# Default for local development:
sqlalchemy.url = postgresql://agpars:agpars_dev@localhost:5432/agpars

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Post-write hooks (optional)
# [post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME
