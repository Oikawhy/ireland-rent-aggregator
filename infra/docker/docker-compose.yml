# ═══════════════════════════════════════════════════════════════════════════════
# AGPARS – Docker Compose (Full Stack)
#
# Usage:

#   docker compose --env-file ../../.env up -d   
#   docker compose up -d            # Start everything
#   docker compose up -d bot notifier # Start specific services
#   docker compose logs -f bot        # Follow logs
#   docker compose down               # Stop all
#
# Requires: .env file (copy from .env.prod.example)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: agpars-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/db/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agpars}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: agpars-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE MIGRATIONS (runs once, then exits)
  # ═══════════════════════════════════════════════════════════════════════════

  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: agpars:latest
    container_name: agpars-migrate
    restart: "no"
    command: python -m alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      PYTHONUNBUFFERED: "1"
    networks:
      - backend

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # All share the same image, different entrypoint commands.
  # ═══════════════════════════════════════════════════════════════════════════

  bot:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: agpars:latest
    container_name: agpars-bot
    restart: unless-stopped
    command: python -m services.bot
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  notifier:
    image: agpars:latest
    container_name: agpars-notifier
    restart: unless-stopped
    command: python -m services.notifier
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  publisher:
    image: agpars:latest
    container_name: agpars-publisher
    restart: unless-stopped
    command: python -m services.publisher
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  normalizer:
    image: agpars:latest
    container_name: agpars-normalizer
    restart: unless-stopped
    command: python -m services.normalizer
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  dedup:
    image: agpars:latest
    container_name: agpars-dedup
    restart: unless-stopped
    command: python -m services.dedup
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  maintenance:
    image: agpars:latest
    container_name: agpars-maintenance
    restart: unless-stopped
    command: python -m services.maintenance
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  scheduler:
    image: agpars:latest
    container_name: agpars-scheduler
    restart: unless-stopped
    command: python -m services.scheduler
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@postgres:5432/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8000
      PYTHONUNBUFFERED: "1"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  collector:
    image: agpars:latest
    container_name: agpars-collector
    restart: unless-stopped
    # Host network mode: shares host IP so Cloudflare cookies
    # obtained on the host are valid inside the container.
    network_mode: host
    command: python -m services.collector
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agpars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agpars_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agpars}
      # Host network: connect via localhost with host-mapped ports
      DATABASE_URL: postgresql://${POSTGRES_USER:-agpars}:${POSTGRES_PASSWORD:-agpars_dev}@localhost:${POSTGRES_PORT:-15432}/${POSTGRES_DB:-agpars}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 15432
      REDIS_HOST: localhost
      REDIS_PORT: ${REDIS_PORT:-16379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      METRICS_PORT: 8010
      PYTHONUNBUFFERED: "1"
      MAX_BROWSER_CONTEXTS: ${MAX_BROWSER_CONTEXTS:-2}
    volumes:
      - collector_browser_data:/app/services/collector/.browser_data
    # No 'networks' — host mode uses the host network stack directly
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8010/metrics" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ═══════════════════════════════════════════════════════════════════════════
  # MONITORING
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: agpars-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ../../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    # Resolve host.docker.internal on Linux (needed to reach collector on host network)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: agpars-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ../../infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: agpars-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-agpars}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infra/grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ../../infra/grafana/dashboards/:/var/lib/grafana/dashboards/:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - alertmanager
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  collector_browser_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge
