# ═══════════════════════════════════════════════════════════════════════════════
# AGPARS Alertmanager Configuration
# ═══════════════════════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "default"
      repeat_interval: 1h
    
    - match:
        severity: critical
      receiver: "telegram_bot"
      continue: true

receivers:
  - name: "default"
    # Configure webhook/email/Telegram alerts here
    # Example webhook:
    # webhook_configs:
    #   - url: "http://notifier:8000/api/alerts"
    #     send_resolved: true

  - name: "telegram_bot"
    webhook_configs:
      - url: "http://agpars-bot:8000/api/alerts"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
